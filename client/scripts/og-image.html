<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..800&family=Outfit:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background:
      radial-gradient(circle at 12% 0%, rgba(212,168,67,0.22), transparent 34%),
      radial-gradient(circle at 100% 20%, rgba(58,58,125,0.55), transparent 45%),
      linear-gradient(135deg, #1a1a2e 0%, #101022 55%, #08080d 100%);
    color: #fff;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 64px 72px;
    position: relative;
  }
  .ring {
    position: absolute; bottom: -180px; right: -140px;
    width: 420px; height: 420px; border-radius: 50%;
    border: 1px solid rgba(212,168,67,0.25);
    box-shadow: 0 0 0 60px rgba(212,168,67,0.07), 0 0 0 150px rgba(212,168,67,0.045), 0 0 0 270px rgba(212,168,67,0.025);
  }
  .brand { display: flex; align-items: center; gap: 18px; }
  .mono {
    width: 64px; height: 64px; border-radius: 50%;
    background: #d4a843; color: #08080d;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 28px;
  }
  .brand-name { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; }
  .brand-sub { font-size: 13px; letter-spacing: 0.32em; color: #d4a843; text-transform: uppercase; margin-top: 4px; }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 700;
    font-size: 76px; line-height: 1.04; max-width: 940px;
    letter-spacing: -0.02em;
  }
  h1 em { color: #d4a843; font-style: normal; }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .pill {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 999px;
    padding: 12px 24px; font-size: 17px; font-weight: 600; color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.06);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #d4a843; }
  .url { font-size: 17px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="brand">
    <div class="mono">PW</div>
    <div>
      <div class="brand-name">People Who Inspire</div>
      <div class="brand-sub">Est. 2025</div>
    </div>
  </div>
  <h1>Stories that move leaders from <em>inspiration to action.</em></h1>
  <div class="bottom">
    <div class="pill"><span class="dot"></span> PWI Conversations · Every Saturday · 7PM GMT</div>
    <div class="url">peoplewhoinspire.global</div>
  </div>
</body>
</html>
