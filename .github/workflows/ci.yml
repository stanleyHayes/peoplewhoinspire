name: CI

# Entry-point pipeline. All real work lives in the reusable workflow
# `.github/workflows/reusable-verify.yml` — add a package here with one `uses:` block.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client
    uses: ./.github/workflows/reusable-verify.yml
    with:
      job-name: Client — lint, typecheck, test & build
      working-directory: client
      lint: true
      coverage: true
      vite-api-url: https://peoplewhoinspire-api.onrender.com/api

  server:
    name: Server
    uses: ./.github/workflows/reusable-verify.yml
    with:
      job-name: Server — typecheck, test & build
      working-directory: server
